<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favicon Generator - FreeMium Resume</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            padding: 40px;
            background: #f0f9ff;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            color: #1e293b;
        }

        .grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 40px 0;
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .preview {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .label {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #2563eb;
        }

        .steps {
            text-align: left;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
        }

        li {
            margin-bottom: 8px;
            color: #334155;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Save Your Favicons</h1>
        <p>Right-click each icon below and select <strong>"Save Image As..."</strong></p>

        <div class="grid">
            <div class="item">
                <div class="label">32x32 PNG</div>
                <img id="fav32" class="preview" alt="Favicon 32x32">
                <a id="btn32" class="btn" download="favicon-32.png">Download 32x32</a>
            </div>
            <div class="item">
                <div class="label">16x16 PNG</div>
                <img id="fav16" class="preview" alt="Favicon 16x16">
                <a id="btn16" class="btn" download="favicon-16.png">Download 16x16</a>
            </div>
        </div>

        <div class="steps">
            <strong>Next Steps:</strong>
            <ol>
                <li>Save both images to your computer.</li>
                <li>Move them to: <code>apps/web/public/</code></li>
                <li>Push to GitHub.</li>
            </ol>
        </div>
    </div>

    <!-- Hidden Canvas for functionality -->
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const svgData = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M20 10 L65 10 L80 25 L80 90 L20 90 Z" fill="white" stroke="#3B82F6" stroke-width="6" stroke-linejoin="round"/><path d="M65 10 L65 25 L80 25" fill="none" stroke="#3B82F6" stroke-width="6" stroke-linejoin="round"/><path d="M30 55 L45 70 L70 40" fill="none" stroke="#3B82F6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

        function generateFavicon(size, imgId, btnId) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            const img = new Image();
            const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

            img.onload = function () {
                ctx.drawImage(img, 0, 0, size, size);
                const pngUrl = canvas.toDataURL('image/png');
                document.getElementById(imgId).src = pngUrl;
                document.getElementById(btnId).href = pngUrl; // Attach to download button
                URL.revokeObjectURL(url);
            };

            img.src = url;
        }

        // Generate both sizes
        generateFavicon(32, 'fav32', 'btn32');
        generateFavicon(16, 'fav16', 'btn16');
    </script>
</body>

</html>
